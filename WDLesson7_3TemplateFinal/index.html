<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>WD Lesson 7.3 Starter Template</title>    

    <!-- LeafletJS CSS file -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- LeafletJS JS file (must place after Leaflet's CSS file) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="script.js"></script>    
  </head>
  
  <body onload="init()">
    <div id="banner" class="container center">
      <h1> Leaflet Map </h1>
    </div>
    <div class="container subbanner">
      <div>
        <p>This examples demonstrates how to display static maps for locations given a latitude and longitude.
           Map functionality is provided through <a href="https://leafletjs.com/examples/quick-start/" target="_blank">LeafletJS</a>.
        </p>
           
       </div>
    </div>    
    <div id="output" class="container">
      <div id="map" style="height:400px;width:100%"></div>
    </div>
    
    <div id="footer" class="container center">
      <h3>Lesson 7.3 Starter Template</h3>
    </div>  
  </body>
</html>
